<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Outfit Suggestor</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .suggestion { font-size: 1.5rem; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Today's Outlook</h1>
        <p>The weather says: <strong>{{ weather_status }}</strong></p>
        <p>You should wear:</p>
        <p class="suggestion">{{ outfit }}</p>
    </div>
</body>
</html>
