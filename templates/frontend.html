<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Outfit Suggestor</title>
</head>
<body>
    <div class="card">
        <h1>Today's Outlook</h1>
        <p>The weather says: <strong>{{ weather_status }}</strong></p>
        <p>You should wear:</p>
        <p class="suggestion">{{ outfit }}</p>
        <button id="theme-switch">Toggle</button>
    </div>
    <link rel="stylesheet" href="{{ url_for('static', filename='frontendstyle.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
