<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viper Projects | Lunar    Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --moonlight: #F6F1D5; 
            --void: #020617; 
            --starlight: #D1D5DB; 
        }
        
        body { 
            background: var(--void); 
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--starlight); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .moon-glow {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(246, 241, 213, 0.08) 0%, rgba(2, 6, 23, 0) 70%);
            filter: blur(50px);
            z-index: 0;
        }

        .container { 
            position: relative;
            text-align: center; 
            z-index: 1; 
            width: 100%; 
            max-width: 450px; 
            padding: 20px; 
        }

        h1 { 
            font-family: 'Space Grotesk'; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            color: var(--moonlight); 
            margin-bottom: 10px; 
            letter-spacing: -0.04em;
        }

        p.tagline { 
            font-weight: 300; 
            letter-spacing: 0.1em; 
            opacity: 0.8;
        }

        .notify-box { 
            margin-top: 40px; 
            display: flex; 
            gap: 10px; 
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(246,241,213,0.1);
        }

        input { 
            background: transparent; 
            border: none; 
            padding: 12px; 
            color: white; 
            flex-grow: 1; 
            outline: none; 
            font-family: 'Inter';
                font-size: 16px; 
        }

        button { 
            background: var(--moonlight); 
            color: var(--void); 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); }

        .social-links {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 20px;
            z-index: 10;
            background: rgba(2, 6, 23, 0.7); 
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 100px;
        }

        .social-icon {
            color: var(--starlight);
            opacity: 0.6;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .social-icon svg { width: 22px; height: 22px; fill: currentColor; }

        .social-icon:hover {
            opacity: 1;
            transform: translateY(-4px);
        }

        .social-icon.linkedin:hover { color: #0077B5; }
        .social-icon.twitter:hover  { color: #FFFFFF; }
        .social-icon.instagram:hover { color: #E4405F; }

        @media (max-width: 480px) {
            .social-links {
                bottom: 25px;
                right: 50%;
                transform: translateX(50%); 
            }
        }
    </style>
</head>
<body>
    <div class="moon-glow"></div>
    
    <div class="container">
        <h1>viperprojects47</h1>
        <p class="tagline">The digital standard is arriving.</p>
        
        <form class="notify-box" id="emailForm">
            <input type="email" id="emailInput" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>
        <p id="msg" style="margin-top:15px; font-size: 0.85rem; color: var(--moonlight);"></p>
    </div>

    <div class="social-links">
        <a href="https://www.linkedin.com/in/pauldinakar/" target="_blank" class="social-icon linkedin">
            <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
        </a>
        <a href="https://x.com/viperpaul47" target="_blank" class="social-icon twitter">
            <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a href="https://www.instagram.com/viperpaul47/" target="_blank" class="social-icon instagram">
            <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        </a>
    </div>


    <script>
    document.getElementById('emailForm').onsubmit = async (e) => {
        e.preventDefault();
        const emailInput = document.getElementById('emailInput');
        const email = emailInput.value;
        const msg = document.getElementById('msg');
        const container = document.querySelector('.container');
        
        msg.innerText = "SENDING REQUEST...";
        
        try {
            const res = await fetch('/api/notify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            if (res.ok) {
                container.innerHTML = `
                    <p style="color: #F6F1D5; font-family: monospace; letter-spacing: 2px; font-size: 1.1rem; text-transform: uppercase;">
                        Request Received.
                    </p>
                    <p style="margin-top: 15px; opacity: 0.5; font-size: 0.8rem; font-family: monospace;">
                        We will notify you of further updates.
                    </p>
                `;
            } else {
                msg.innerText = "ERROR: REQUEST FAILED.";
            }
        } catch (err) {
            msg.innerText = "SYSTEM OFFLINE.";
            console.error(err);
        }
    };
</script>
</body>
</html>
