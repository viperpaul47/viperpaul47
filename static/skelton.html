    <script>
    document.getElementById('emailForm').onsubmit = async (e) => {
        e.preventDefault();
        const emailInput = document.getElementById('emailInput');
        const email = emailInput.value;
        const msg = document.getElementById('msg');
        const container = document.querySelector('.container');
        
        msg.innerText = "SENDING REQUEST...";
        
        try {
            const res = await fetch('/api/notify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            if (res.ok) {
                container.innerHTML = `
                    <p style="color: #F6F1D5; font-family: monospace; letter-spacing: 2px; font-size: 1.1rem; text-transform: uppercase;">
                        Request Received.
                    </p>
                    <p style="margin-top: 15px; opacity: 0.5; font-size: 0.8rem; font-family: monospace;">
                        We will notify you of further updates.
                    </p>
                `;
            } else {
                msg.innerText = "ERROR: REQUEST FAILED.";
            }
        } catch (err) {
            msg.innerText = "SYSTEM OFFLINE.";
            console.error(err);
        }
    };
</script>
